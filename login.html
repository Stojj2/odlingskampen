<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Odlingskampen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@scania/tegel@1.50.0/dist/tegel/tegel.css" />
  <link rel="stylesheet" href="tegel-ui.css?v=20260414-tegel-modal-33" />
  </head>
  <body class="scania tds-mode-light tegel-login-page">
    <tds-header class="tegel-app-header">
      <tds-header-title slot="title">Odlingskampen</tds-header-title>
    </tds-header>

    <main class="tegel-login-shell">
      <tds-card class="tegel-login-card" header="Login" subheader="Logga in med ditt användarnamn och lösenord.">
        <div slot="body" class="tegel-login-content" id="login-shell">
          <div class="tegel-login-form">
            <tds-text-field
              id="username"
              label="Användarnamn"
              label-position="outside"
              size="lg"
              autocomplete="username"
              required
            ></tds-text-field>

            <tds-text-field
              id="password"
              type="password"
              label="Lösenord"
              label-position="outside"
              size="lg"
              autocomplete="current-password"
              required
            ></tds-text-field>
          </div>
        </div>
        <div slot="actions" class="tegel-login-actions">
          <tds-button id="login-submit" size="md" text="Logga in" type="button"></tds-button>
          <tds-message id="login-error" variant="error" hidden></tds-message>
        </div>
      </tds-card>
    </main>

    <script type="module">
      import { defineCustomElements } from "https://cdn.jsdelivr.net/npm/@scania/tegel@1.50.0/loader/index.es2017.js";

      defineCustomElements(window);
    </script>
    <script>
      const shell = document.getElementById("login-shell");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const submitButton = document.getElementById("login-submit");
      const errorNode = document.getElementById("login-error");
      const queryNextPath = new URLSearchParams(window.location.search).get("next") || "";

      function readFieldValue(element) {
        return typeof element?.value === "string" ? element.value.trim() : "";
      }

      function setError(message = "") {
        if (!errorNode) {
          return;
        }

        errorNode.textContent = message;
        errorNode.hidden = !message;
      }

      async function submitLogin() {
        setError("");
        submitButton.setAttribute("disabled", "");

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: readFieldValue(usernameInput),
              password: typeof passwordInput?.value === "string" ? passwordInput.value : "",
              next: queryNextPath,
            }),
          });

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            setError(payload.error || "Det gick inte att logga in.");
            submitButton.removeAttribute("disabled");
            return;
          }

          window.location.assign(payload.next || "/");
        } catch {
          setError("Det gick inte att kontakta servern.");
          submitButton.removeAttribute("disabled");
        }
      }

      submitButton.addEventListener("click", submitLogin);
      shell.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitLogin();
        }
      });
    </script>
  </body>
</html>
