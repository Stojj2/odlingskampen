<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Odlingskampen</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@scania/tegel@1.50.0/dist/tegel/tegel.css" />
  <link rel="stylesheet" href="tegel-ui.css?v=20260419-mobile-input-zoom-global-01" />
  </head>
  <body class="scania tds-mode-light tegel-login-page">
    <a class="tegel-skip-link" href="#main-content">Hoppa till innehåll</a>
    <tds-header class="tegel-app-header">
      <tds-header-title slot="title">Odlingskampen</tds-header-title>
    </tds-header>

    <main id="main-content" class="tegel-login-shell" tabindex="-1">
      <tds-card class="tegel-login-card" header="Login" subheader="Logga in med ditt användarnamn och lösenord.">
        <div slot="body" class="tegel-login-content" id="login-shell">
          <div class="tegel-login-form">
            <tds-text-field
              id="username"
              label="Användarnamn"
              label-position="outside"
              size="lg"
              autocomplete="username"
              required
            ></tds-text-field>

            <tds-text-field
              id="password"
              type="password"
              label="Lösenord"
              label-position="outside"
              size="lg"
              autocomplete="current-password"
              required
            ></tds-text-field>
          </div>
        </div>
        <div slot="actions" class="tegel-login-actions">
          <tds-button id="login-submit" size="md" text="Logga in" type="button"></tds-button>
          <tds-message id="login-error" variant="error" hidden role="alert" aria-live="assertive"></tds-message>
        </div>
      </tds-card>
    </main>

    <script type="module">
      import { defineCustomElements } from "https://cdn.jsdelivr.net/npm/@scania/tegel@1.50.0/loader/index.es2017.js";

      defineCustomElements(window);
    </script>
    <script>
      const shell = document.getElementById("login-shell");
      const usernameInput = document.getElementById("username");
      const passwordInput = document.getElementById("password");
      const submitButton = document.getElementById("login-submit");
      const errorNode = document.getElementById("login-error");
      const queryNextPath = new URLSearchParams(window.location.search).get("next") || "";
      const viewportMeta = document.querySelector('meta[name="viewport"]');
      const defaultViewportContent = viewportMeta?.getAttribute("content") || "width=device-width, initial-scale=1.0";
      const isIosTouchDevice =
        /iPhone|iPad|iPod/i.test(navigator.userAgent || "") ||
        (navigator.platform === "MacIntel" && Number(navigator.maxTouchPoints || 0) > 1);
      const isTouchDevice = window.matchMedia("(pointer: coarse)").matches || Number(navigator.maxTouchPoints || 0) > 0;
      let viewportZoomLockEnabled = false;
      let hasUserInteractedWithForm = false;

      function readFieldValue(element) {
        return typeof element?.value === "string" ? element.value.trim() : "";
      }

      function setError(message = "") {
        if (!errorNode) {
          return;
        }

        errorNode.textContent = message;
        errorNode.hidden = !message;
      }

      function forceLoginFieldFontSize(element) {
        if (!(element instanceof HTMLElement)) {
          return;
        }

        element.style.fontSize = "16px";
        element.style.setProperty("-webkit-text-size-adjust", "100%");
        const shadowRoot = element.shadowRoot || null;
        if (!shadowRoot) {
          return;
        }

        const editable = shadowRoot.querySelector("input, textarea");
        if (editable instanceof HTMLElement) {
          editable.style.fontSize = "16px";
          editable.style.setProperty("-webkit-text-size-adjust", "100%");
        }
      }

      function applyLoginFieldSizing() {
        forceLoginFieldFontSize(usernameInput);
        forceLoginFieldFontSize(passwordInput);
      }

      function markUserInteractedWithForm() {
        hasUserInteractedWithForm = true;
      }

      function blurLoginField(element) {
        if (!(element instanceof HTMLElement)) {
          return;
        }

        const editable = element.shadowRoot?.querySelector("input, textarea");
        if (editable instanceof HTMLElement) {
          editable.blur();
        }
        element.blur();
      }

      function releaseInitialFormFocus() {
        if (!isTouchDevice || hasUserInteractedWithForm) {
          return;
        }

        blurLoginField(usernameInput);
        blurLoginField(passwordInput);
      }

      function setLoginViewportZoomLock(shouldLock) {
        if (!viewportMeta || !isIosTouchDevice || viewportZoomLockEnabled === Boolean(shouldLock)) {
          return;
        }

        const baseParts = defaultViewportContent
          .split(",")
          .map((part) => part.trim())
          .filter(Boolean)
          .filter((part) => !/^maximum-scale\s*=/i.test(part));

        if (shouldLock) {
          baseParts.push("maximum-scale=1");
        }

        viewportMeta.setAttribute("content", baseParts.join(", "));
        viewportZoomLockEnabled = Boolean(shouldLock);
      }

      async function submitLogin() {
        setError("");
        submitButton.setAttribute("disabled", "");

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: readFieldValue(usernameInput),
              password: typeof passwordInput?.value === "string" ? passwordInput.value : "",
              next: queryNextPath,
            }),
          });

          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            setError(payload.error || "Det gick inte att logga in.");
            submitButton.removeAttribute("disabled");
            return;
          }

          window.location.assign(payload.next || "/");
        } catch {
          setError("Det gick inte att kontakta servern.");
          submitButton.removeAttribute("disabled");
        }
      }

      submitButton.addEventListener("click", submitLogin);
      [usernameInput, passwordInput].forEach((field) => {
        field?.addEventListener("touchstart", () => {
          markUserInteractedWithForm();
          setLoginViewportZoomLock(true);
        }, { passive: true });
        field?.addEventListener("pointerdown", (event) => {
          markUserInteractedWithForm();
          if (event.pointerType !== "mouse") {
            setLoginViewportZoomLock(true);
          }
        });
        field?.addEventListener("focusin", applyLoginFieldSizing);
        field?.addEventListener("focusin", () => {
          setLoginViewportZoomLock(true);
        });
        field?.addEventListener("click", applyLoginFieldSizing);
      });
      shell.addEventListener("pointerdown", markUserInteractedWithForm);
      shell.addEventListener("keydown", markUserInteractedWithForm);
      shell.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          submitLogin();
        }
      });

      requestAnimationFrame(() => {
        applyLoginFieldSizing();
        releaseInitialFormFocus();
      });
      setTimeout(() => {
        applyLoginFieldSizing();
        releaseInitialFormFocus();
      }, 250);
      setTimeout(releaseInitialFormFocus, 700);
      if (isIosTouchDevice) {
        setLoginViewportZoomLock(true);
        window.addEventListener("pageshow", () => {
          setLoginViewportZoomLock(true);
          releaseInitialFormFocus();
        });
        document.addEventListener("visibilitychange", () => {
          if (!document.hidden) {
            setLoginViewportZoomLock(true);
            releaseInitialFormFocus();
          }
        });
      }
    </script>
  </body>
</html>
