services:
  odlingskampen:
    build:
      context: .
    container_name: odlingskampen
    restart: unless-stopped
    environment:
      TZ: Europe/Stockholm
      PYTHONUNBUFFERED: "1"
      ODLINGSKAMPEN_MAX_VIDEO_UPLOAD_MB: "200"
    ports:
      - "8180:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    command: ["python", "server.py", "--host", "0.0.0.0", "--port", "8080"]
